# CuDi default configuration

seed: 42
device: cuda

paths:
  train_dir: data/train
  test_dir: data/test
  checkpoints_dir: checkpoints
  outputs_dir: outputs

training:
  batch_size: 8
  image_size: 256
  num_workers: 4

teacher:
  lr: 0.0001
  epochs: 600
  lambda_sec: 10.0
  lambda_sc: 1.0
  lambda_cc: 5.0
  lambda_is: 200.0

student:
  lr: 0.0005
  epochs: 600
  downsample: 4

inference:
  exposure: 0.65
  mode: uniform
